services:
  - type: web
    name: roma-toscana-2026
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run trip:start
    envVars:
      - key: TRIP_DATA_FILE
        value: /var/data/roma-toscana-2026.json
      - key: PERSIST_DATA
        value: "true"
    disk:
      name: trip-data
      mountPath: /var/data
      sizeGB: 1
